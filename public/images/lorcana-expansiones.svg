<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Expansiones de Disney Lorcana">
  <defs>
    <linearGradient id="bg-lorcana-sets" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a044e" />
      <stop offset="100%" stop-color="#713f12" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg-lorcana-sets)" />

  <g transform="translate(400, 190)" text-anchor="middle">
    <rect x="-60" y="-90" width="120" height="160" rx="8" fill="#fbbf24" stroke="#f59e0b" stroke-width="4" />
    <rect x="-50" y="-80" width="100" height="90" rx="4" fill="#4a044e" />
    <text x="0" y="-25" font-family="serif" font-size="24" font-weight="bold" fill="#fae8ff" text-anchor="middle">Set 1</text>
    <polygon points="-20,65 0,85 20,65" fill="#ef4444" />
  </g>

  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#fae8ff" text-anchor="middle">
