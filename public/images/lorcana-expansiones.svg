  </text>
  <text x="400" y="365" font-family="system-ui, sans-serif" font-size="16" fill="#e9d5ff" text-anchor="middle">
    Sets, lanzamientos y novedades | tcglat.com
  </text>

  <rect x="0" y="0" width="800" height="6" fill="#d946ef" />
  <rect x="0" y="444" width="800" height="6" fill="#d946ef" />
