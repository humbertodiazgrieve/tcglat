<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Historia de Yu-Gi-Oh! TCG">
  <defs>
    <linearGradient id="bg-ygo-history" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#7c2d12" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg-ygo-history)" />

  <g transform="translate(400, 190)" text-anchor="middle">
    <rect x="-60" y="-90" width="120" height="160" rx="8" fill="#f97316" stroke="#fbbf24" stroke-width="4" />
    <rect x="-50" y="-80" width="100" height="90" rx="4" fill="#111827" />
