<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Gradiente principal azul/púrpura -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente para las cartas -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Patrón de fondo -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Fondo con gradiente -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Patrón de fondo -->
  <rect width="1200" height="630" fill="url(#gridPattern)"/>
  
  <!-- Círculos decorativos -->
  <circle cx="150" cy="150" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1050" cy="480" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="600" cy="50" r="100" fill="rgba(255,255,255,0.02)"/>
  
  <!-- Contenedor principal -->
  <g transform="translate(600, 315)">
    
    <!-- Badge de categoría -->
    <g transform="translate(0, -200)">
      <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#ef4444"/>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle" text-transform="uppercase">GUÍAS</text>
    </g>
    
    <!-- Título principal -->
    <text x="0" y="-120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">Build &amp; Battle</text>
    
    <!-- Subtítulo -->
    <text x="0" y="-60" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.9)" text-anchor="middle">Guía de Prelanzamiento Pokémon TCG</text>
    
    <!-- Línea decorativa -->
    <line x1="-150" y1="-20" x2="150" y2="-20" stroke="url(#cardGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Iconos de cartas estilizadas -->
    <g transform="translate(-200, 80)" filter="url(#shadow)">
      <!-- Carta 1 -->
      <rect x="-40" y="-55" width="80" height="110" rx="8" fill="white" stroke="#e5e7eb" stroke-width="2"/>
      <rect x="-35" y="-50" width="70" height="70" rx="4" fill="#10b981"/>
      <text x="0" y="-10" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🌿</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">SERPERIOR</text>
    </g>
    
    <g transform="translate(-70, 80)" filter="url(#shadow)">
      <!-- Carta 2 -->
      <rect x="-40" y="-55" width="80" height="110" rx="8" fill="white" stroke="#e5e7eb" stroke-width="2"/>
      <rect x="-35" y="-50" width="70" height="70" rx="4" fill="#6366f1"/>
      <text x="0" y="-10" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">⚔️</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">DOUBLADE</text>
    </g>
    
    <g transform="translate(70, 80)" filter="url(#shadow)">
      <!-- Carta 3 -->
      <rect x="-40" y="-55" width="80" height="110" rx="8" fill="white" stroke="#e5e7eb" stroke-width="2"/>
      <rect x="-35" y="-50" width="70" height="70" rx="4" fill="#dc2626"/>
      <text x="0" y="-10" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🦖</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">TYRANTRUM</text>
    </g>
    
    <g transform="translate(200, 80)" filter="url(#shadow)">
      <!-- Carta 4 -->
      <rect x="-40" y="-55" width="80" height="110" rx="8" fill="white" stroke="#e5e7eb" stroke-width="2"/>
      <rect x="-35" y="-50" width="70" height="70" rx="4" fill="#0891b2"/>
      <text x="0" y="-10" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🦀</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">BARBARACLE</text>
    </g>
    
    <!-- Info adicional -->
    <g transform="translate(0, 200)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Megaevolución – Equilibrio Perfecto</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">14 de marzo de 2026</text>
    </g>
    
    <!-- Logo TCGlat -->
    <g transform="translate(480, -260)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
      <text x="0" y="4" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">TCGlat</text>
    </g>
  </g>
  
  <!-- Bordes decorativos -->
  <rect x="20" y="20" width="1160" height="590" rx="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
</svg>