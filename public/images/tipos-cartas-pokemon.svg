<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a1d6a"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fondo con gradiente -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Círculos decorativos de fondo -->
  <circle cx="200" cy="150" r="250" fill="#ffffff" opacity="0.03"/>
  <circle cx="1000" cy="500" r="300" fill="#ffffff" opacity="0.03"/>
  <circle cx="600" cy="315" r="200" fill="#ffffff" opacity="0.02"/>
  
  <!-- Tarjeta decorativa Pokémon (izquierda) -->
  <g transform="translate(80, 140)">
    <rect width="180" height="250" rx="12" fill="#ffffff" opacity="0.1" filter="url(#softShadow)"/>
    <rect x="10" y="10" width="160" height="200" rx="8" fill="#1a1a2e"/>
    <rect x="15" y="15" width="150" height="140" rx="4" fill="#2d2d44"/>
    <!-- Ilustración simplificada de carta -->
    <circle cx="90" cy="85" r="50" fill="#fbbf24" opacity="0.8"/>
    <path d="M60 100 Q90 60 120 100 L110 120 L70 120 Z" fill="#ef4444"/>
    <!-- Nombre de carta -->
    <rect x="20" y="165" width="140" height="8" rx="2" fill="#ffffff" opacity="0.5"/>
    <rect x="20" y="180" width="100" height="8" rx="2" fill="#ffffff" opacity="0.3"/>
    <!--HP badge -->
    <rect x="120" y="165" width="40" height="16" rx="4" fill="#ef4444"/>
    <text x="140" y="177" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">HP</text>
  </g>
  
  <!-- Segunda tarjeta decorativa (derecha) -->
  <g transform="translate(940, 100) rotate(15)">
    <rect width="140" height="195" rx="10" fill="#ffffff" opacity="0.08" filter="url(#softShadow)"/>
    <rect x="8" y="8" width="124" height="150" rx="6" fill="#1a1a2e"/>
    <circle cx="70" cy="80" r="40" fill="#3b82f6" opacity="0.8"/>
    <rect x="15" y="165" width="110" height="6" rx="2" fill="#ffffff" opacity="0.4"/>
  </g>
  
  <!-- Contenido principal -->
  <g transform="translate(300, 120)">
    <!-- Badge de categoría -->
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#fbbf24"/>
    <text x="50" y="22" font-family="system-ui, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle" font-weight="700">GUÍA</text>
    
    <!-- Título principal -->
    <text x="0" y="100" font-family="system-ui, sans-serif" font-size="48" fill="#fbbf24" font-weight="800">
      Tipos de Cartas
    </text>
    <text x="0" y="160" font-family="system-ui, sans-serif" font-size="48" fill="#ffffff" font-weight="800">
      Pokémon TCG
    </text>
    
    <!-- Subtítulo -->
    <text x="0" y="210" font-family="system-ui, sans-serif" font-size="24" fill="#e9d5ff" font-weight="500">
      Guía completa: EX, GX, V, VMAX, TERA y más
    </text>
    
    <!-- Tags -->
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="140" height="28" rx="14" fill="#ffffff" opacity="0.15"/>
      <text x="70" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Full Art</text>
      
      <rect x="150" y="0" width="120" height="28" rx="14" fill="#ffffff" opacity="0.15"/>
      <text x="210" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Rainbow Rare</text>
      
      <rect x="280" y="0" width="100" height="28" rx="14" fill="#ffffff" opacity="0.15"/>
      <text x="330" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Secretas</text>
    </g>
  </g>
  
  <!-- Branding footer -->
  <g transform="translate(1050, 590)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff" font-weight="600" text-anchor="end" opacity="0.9">tcglat</text>
  </g>
  
  <!-- Decoración adicional -->
  <circle cx="50" cy="580" r="30" fill="#fbbf24" opacity="0.2"/>
  <circle cx="1150" cy="50" r="40" fill="#ffffff" opacity="0.05"/>
</svg>
