      <stop offset="0%" stop-color="#7f1d1d" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg-op-cards)" />

  <g transform="translate(400, 190)" text-anchor="middle">
