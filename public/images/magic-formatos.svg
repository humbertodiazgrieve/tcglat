<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Formatos de Magic: The Gathering">
  <defs>
    <linearGradient id="bg-formats" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg-formats)" />

  <g transform="translate(400, 180)" text-anchor="middle">
    <rect x="-250" y="-50" width="100" height="100" rx="16" fill="#f3f4f6" />
    <text x="-200" y="15" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#111827" text-anchor="middle">S</text>

    <rect x="-120" y="-50" width="100" height="100" rx="16" fill="#3b82f6" />
    <text x="-70" y="15" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text>

    <rect x="10" y="-50" width="100" height="100" rx="16" fill="#10b981" />
    <text x="60" y="15" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">M</text>

    <rect x="140" y="-50" width="100" height="100" rx="16" fill="#f59e0b" />
    <text x="190" y="15" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">D</text>
  </g>

  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#f9fafb" text-anchor="middle">
