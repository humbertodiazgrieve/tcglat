<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Mejores cartas de Disney Lorcana">
  <defs>
    <linearGradient id="bg-lorcana-cards" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a044e" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg-lorcana-cards)" />

  <g transform="translate(400, 190)" text-anchor="middle">
    <rect x="-100" y="-70" width="70" height="100" rx="6" fill="#f0abfc" stroke="#d946ef" stroke-width="3" />
    <rect x="-20" y="-80" width="70" height="100" rx="6" fill="#f0abfc" stroke="#d946ef" stroke-width="3" />
    <rect x="60" y="-70" width="70" height="100" rx="6" fill="#f0abfc" stroke="#d946ef" stroke-width="3" />
    <text x="5" y="-25" font-family="serif" font-size="28" font-weight="bold" fill="#701a75" text-anchor="middle">LOR</text>
  </g>

  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#fae8ff" text-anchor="middle">
    Mejores Cartas de Lorcana
  </text>
  <text x="400" y="365" font-family="system-ui, sans-serif" font-size="16" fill="#e9d5ff" text-anchor="middle">
